<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>betterreads</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav id="site-nav" class="site-nav"></nav>
    <div class="container">
      <h1>betterreads</h1>

      <div class="search-layout">
        <p class="search-label">Search:</p>

        <div class="search-controls">
          <label class="search-field">
            <span>Title</span>
            <input id="titleInput" type="text" autocomplete="off" />
          </label>

          <label class="search-field">
            <span>Author</span>
            <input id="authorInput" type="text" autocomplete="off" />
          </label>

          <label class="search-field">
            <span>Genre</span>
            <input id="genreInput" type="text" autocomplete="off" />
          </label>

          <button id="searchButton" class="action-btn" type="button">
            Search
          </button>
        </div>
      </div>

      <ul id="results"></ul>
    </div>

    <script src="nav.js"></script>
    <script src="app.js"></script>
  </body>
</html>
