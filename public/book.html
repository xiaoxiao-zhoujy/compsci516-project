<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>betterreads - Book Details</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div id="auth-header"></div>
      <a href="/" class="back-link">Back to Search</a>
      <div id="book-detail" class="book-detail">
        <p>Loading...</p>
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const bookId = params.get("id");

      function renderStars(rating) {
        const safeRating = Math.max(0, Math.min(5, Number(rating) || 0));
        let stars = "";
        for (let i = 1; i <= 5; i++) {
          stars += i <= safeRating ? "★" : "☆";
        }
        return stars;
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderAuthHeader() {
        const headerEl = document.getElementById("auth-header");
        if (!headerEl) return;

        const uid = localStorage.getItem("uid");
        const username = localStorage.getItem("username");
        const profileIconUrl = localStorage.getItem("profile_icon_url");

        headerEl.innerHTML = "";

        if (uid) {
          const link = document.createElement("a");
          link.href = "profile.html";
          link.className = "auth-user-link";

          const icon = document.createElement("img");
          icon.className = "auth-user-icon";
          icon.src = profileIconUrl || "/assets/icons/icon1.png";
          icon.alt = "Profile icon";

          const name = document.createElement("span");
          name.textContent = username || "User";

          link.appendChild(icon);
          link.appendChild(name);

          const logoutBtn = document.createElement("button");
          logoutBtn.className = "action-btn";
          logoutBtn.textContent = "Logout";
          logoutBtn.addEventListener("click", () => {
            localStorage.removeItem("uid");
            localStorage.removeItem("username");
            localStorage.removeItem("profile_icon_url");
            window.location.href = "index.html";
          });

          headerEl.appendChild(link);
          headerEl.appendChild(logoutBtn);
        } else {
          const link = document.createElement("a");
          link.href = "login.html";
          link.textContent = "Login / Register";
          headerEl.appendChild(link);
        }
      }

      async function loadBook() {
        const detailEl = document.getElementById("book-detail");

        if (!bookId) {
          detailEl.innerHTML = "<p>No book selected.</p>";
          return;
        }

        try {
          const res = await fetch(`/api/book/${bookId}`);
          if (!res.ok) throw new Error("Book not found");
          const book = await res.json();

          // Also fetch user ratings
          const ratingsRes = await fetch(`/api/book/${bookId}/ratings`);
          const ratingsData = await ratingsRes.json();

          detailEl.innerHTML = `
            <div class="book-layout">
              <div class="book-cover">
                ${
                  book.cover_image_url
                    ? `<img src="${book.cover_image_url}" alt="${book.title}" />`
                    : `<div class="no-cover">No Cover</div>`
                }
              </div>
              <div class="book-info">
                <h1>${book.title}</h1>
                <h2>by ${book.author || "Unknown"}</h2>
                <p class="book-meta">
                  ${book.primary_genre ? `<span class="genre">${book.primary_genre}</span>` : ""}
                  ${book.pages ? `<span>${book.pages} pages</span>` : ""}
                  ${book.isbn ? `<span>ISBN: ${book.isbn}</span>` : ""}
                </p>
                <p class="book-rating">
                  Average Rating: ${book.average_rating || "N/A"} / 5
                  ${
                    ratingsData.num_ratings > 0
                      ? `<br>User Ratings: ${ratingsData.avg_rating} / 5 (${ratingsData.num_ratings} ratings)`
                      : ""
                  }
                </p>
                ${
                  book.genres && book.genres.length > 0
                    ? `<p class="book-genres">Genres: ${book.genres.join(", ")}</p>`
                    : ""
                }
                <p class="book-description">${book.description || "No description available."}</p>

                <div class="action-buttons">
                  <button id="btn-read" class="action-btn" onclick="markAs('read')">Mark as Read</button>
                  <button id="btn-want" class="action-btn" onclick="markAs('want-to-read')">Mark as Want-to-Read</button>
                </div>
                <p id="status-message"></p>

                <div class="rate-section">
                  <h3>Rate this book</h3>
                  <div class="star-rating" id="star-rating">
                    <span class="star" data-value="1">&#9733;</span>
                    <span class="star" data-value="2">&#9733;</span>
                    <span class="star" data-value="3">&#9733;</span>
                    <span class="star" data-value="4">&#9733;</span>
                    <span class="star" data-value="5">&#9733;</span>
                  </div>
                  <p id="rate-message"></p>
                </div>
              </div>
            </div>

            <div class="review-section">
                  <h3>Reviews</h3>

                  <div class="leave-review">
                    <h4>Leave a review</h4>
                    <textarea
                      id="review-text"
                      class="review-textarea"
                      rows="4"
                      placeholder="Write your review here..."
                    ></textarea>
                    <div class="review-actions">
                      <button id="submit-review-btn" class="action-btn" type="button">
                        Submit Review
                      </button>
                    </div>
                    <p id="review-message"></p>
                  </div>

                  <div id="reviews-list" class="reviews-list">
                    <p>Loading reviews...</p>
                  </div>
                </div>
              </div>
            </div>

            <div class="recommendations-section">
              <div class="recommendations-header">
                <h3>You might also like</h3>
                <button id="refresh-recommendations" class="action-btn" type="button">
                  Refresh recommendations
                </button>
              </div>
              <p class="recommendations-subtitle">
                Recommendations are based on shared genres first, then average rating.
              </p>
              <div id="recommendations" class="recommendations-grid">Loading...</div>
            </div>
          `;

          // Set up star rating clicks
          document.querySelectorAll(".star").forEach((star) => {
            star.addEventListener("mouseenter", () => {
              const val = parseInt(star.dataset.value);
              highlightStars(val);
            });
            star.addEventListener("mouseleave", () => {
              highlightStars(currentRating);
            });
            star.addEventListener("click", () => {
              submitRating(parseInt(star.dataset.value));
            });
          });

          // Load user's status for this book
          loadStatus();

          const reviewBtn = document.getElementById("submit-review-btn");
          if (reviewBtn) {
            reviewBtn.addEventListener("click", submitReview);
          }

          // Load user's status for this book
          loadStatus();

          // Load reviews
          loadReviews();

          // Load recommendations
          document
            .getElementById("refresh-recommendations")
            .addEventListener("click", () => loadRecommendations());
          loadRecommendations();
        } catch (error) {
          detailEl.innerHTML = "<p>Error loading book details.</p>";
          console.error(error);
        }
      }

      let currentRating = 0;

      function highlightStars(count) {
        document.querySelectorAll(".star").forEach((star) => {
          const val = parseInt(star.dataset.value);
          star.classList.toggle("active", val <= count);
        });
      }

      async function submitRating(rating) {
        const msgEl = document.getElementById("rate-message");

        const uid = localStorage.getItem("uid");
        if (!uid) {
          msgEl.textContent = "Please login to rate or save books.";
          msgEl.style.color = "red";
          return;
        }

        try {
          const res = await fetch("/api/rate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ uid, book_id: parseInt(bookId), rating }),
          });

          const data = await res.json();

          if (res.ok) {
            msgEl.textContent = `You rated this book ${rating}/5! (Added to your Read list)`;
            msgEl.style.color = "green";
            highlightStars(rating);
            // Reload to update rating display
            setTimeout(() => loadBook(), 1000);
          } else {
            msgEl.textContent = data.error || "Failed to submit rating.";
            msgEl.style.color = "red";
          }
        } catch (error) {
          msgEl.textContent = "Error submitting rating.";
          msgEl.style.color = "red";
        }
      }

      async function submitReview() {
        const uid = localStorage.getItem("uid");
        const username = localStorage.getItem("username");
        const msgEl = document.getElementById("review-message");
        const textEl = document.getElementById("review-text");

        if (!uid) {
          msgEl.textContent = "Please login to leave a review.";
          msgEl.style.color = "red";
          return;
        }

        const review = textEl.value.trim();

        if (!review) {
          msgEl.textContent = "Please write a review before submitting.";
          msgEl.style.color = "red";
          return;
        }

        if (!currentRating) {
          msgEl.textContent = "Please rate the book before leaving a review.";
          msgEl.style.color = "red";
          return;
        }

        try {
          const res = await fetch("/api/review", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              uid,
              username,
              book_id: parseInt(bookId),
              rating: currentRating,
              review,
            }),
          });

          const data = await res.json();

          if (res.ok) {
            msgEl.textContent = "Review submitted successfully.";
            msgEl.style.color = "green";
            textEl.value = "";
            loadReviews();
          } else {
            msgEl.textContent = data.error || "Failed to submit review.";
            msgEl.style.color = "red";
          }
        } catch (error) {
          msgEl.textContent = "Error submitting review.";
          msgEl.style.color = "red";
        }
      }

      async function loadReviews() {
        const reviewsEl = document.getElementById("reviews-list");
        if (!reviewsEl) return;

        reviewsEl.innerHTML = "<p>Loading reviews...</p>";

        try {
          const res = await fetch(`/api/book/${bookId}/reviews`);
          if (!res.ok) throw new Error("Failed to load reviews");

          const reviews = await res.json();

          if (!reviews.length) {
            reviewsEl.innerHTML =
              "<p>No reviews yet. Be the first to leave one.</p>";
            return;
          }

          reviewsEl.innerHTML = reviews
            .map(
              (r) => `
              <div class="review-card">
                <div class="review-header">
                  <span class="review-user"><img class="user-icon-small" src="${escapeHtml(r.profile_icon_url || "/assets/icons/icon1.png")}" alt="${escapeHtml(r.username || "Anonymous")} icon" onerror="this.onerror=null;this.src='/assets/icons/icon1.png';" />${escapeHtml(r.username || "Anonymous")}</span>
                  <span class="review-stars">${renderStars(r.rating)}</span>
                </div>
                <p class="review-body">${escapeHtml(r.review)}</p>
              </div>
            `,
            )
            .join("");
        } catch (error) {
          reviewsEl.innerHTML = "<p>Error loading reviews.</p>";
          console.error("Error loading reviews:", error);
        }
      }

      let currentStatus = null;

      async function loadStatus() {
        const uid = localStorage.getItem("uid");
        if (!uid) {
          currentStatus = null;
          highlightStars(0);
          const statusEl = document.getElementById("status-message");
          if (statusEl) statusEl.textContent = "";
          return;
        }
        try {
          const res = await fetch(`/api/book/${bookId}/status?uid=${uid}`);
          const data = await res.json();

          currentStatus = data.status;

          const statusEl = document.getElementById("status-message");
          const btnRead = document.getElementById("btn-read");
          const btnWant = document.getElementById("btn-want");

          btnRead.classList.remove("active-btn");
          btnWant.classList.remove("active-btn");

          if (data.status === "read") {
            statusEl.textContent = "You have read this book";
            statusEl.style.color = "#2a5db0";
            btnRead.classList.add("active-btn");
          } else if (data.status === "want-to-read") {
            statusEl.textContent = "On your want-to-read list";
            statusEl.style.color = "#2a5db0";
            btnWant.classList.add("active-btn");
          } else {
            statusEl.textContent = "";
          }

          if (data.rating) {
            currentRating = data.rating;
            highlightStars(data.rating);
          }
        } catch (err) {
          console.error("Error loading status:", err);
        }
      }

      async function markAs(type) {
        const uid = localStorage.getItem("uid");
        const statusEl = document.getElementById("status-message");

        if (!uid) {
          statusEl.textContent = "Please login to rate or save books.";
          statusEl.style.color = "red";
          return;
        }

        // If clicking the already-active button, unmark it
        if (currentStatus === type) {
          try {
            const res = await fetch("/api/unmark", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ uid, book_id: parseInt(bookId) }),
            });
            const data = await res.json();
            if (res.ok) {
              statusEl.textContent = "Book removed from your list";
              statusEl.style.color = "green";
              loadStatus();
            }
          } catch (error) {
            console.error("Unmark error:", error);
          }
          return;
        }

        const endpoint =
          type === "read" ? "/api/mark-read" : "/api/mark-want-to-read";

        try {
          const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ uid, book_id: parseInt(bookId) }),
          });

          const data = await res.json();

          if (res.ok) {
            statusEl.textContent = data.message;
            statusEl.style.color = "green";
            loadStatus();
          } else {
            statusEl.textContent = data.error || "Failed to update.";
            statusEl.style.color = "red";
          }
        } catch (error) {
          console.error("Mark error:", error);
        }
      }

      async function loadRecommendations() {
        const recEl = document.getElementById("recommendations");
        const refreshBtn = document.getElementById("refresh-recommendations");
        const uid = localStorage.getItem("uid");
        const query = uid ? `?uid=${encodeURIComponent(uid)}` : "";

        recEl.innerHTML = "<p>Loading recommendations...</p>";
        if (refreshBtn) {
          refreshBtn.disabled = true;
          refreshBtn.textContent = "Refreshing...";
        }

        try {
          const res = await fetch(`/api/recommendations/${bookId}${query}`);
          if (!res.ok) {
            throw new Error("Recommendations request failed");
          }
          const books = await res.json();

          if (!books.length) {
            recEl.innerHTML = "<p>No recommendations available.</p>";
            return;
          }

          recEl.innerHTML = books
            .map(
              (b) => `
              <a href="book.html?id=${b.book_id}" class="rec-card">
                ${
                  b.cover_image_url
                    ? `<img src="${b.cover_image_url}" alt="${b.title}" />`
                    : `<div class="no-cover-small">No Cover</div>`
                }
                <p class="rec-title">${b.title}</p>
                <p class="rec-author">${b.author || "Unknown"}</p>
                <p class="rec-reason">${b.reason || "Recommended because it is similar to this book."}</p>
                <p class="rec-rating">Average rating: ${b.average_rating ? Number(b.average_rating).toFixed(2) : "N/A"} / 5</p>
              </a>`,
            )
            .join("");
        } catch (err) {
          recEl.innerHTML = "<p>Error loading recommendations.</p>";
        } finally {
          if (refreshBtn) {
            refreshBtn.disabled = false;
            refreshBtn.textContent = "Refresh recommendations";
          }
        }
      }

      renderAuthHeader();
      loadBook();
    </script>
  </body>
</html>
